  <title>Analytics · RTGS PGL</title>
  <link rel="stylesheet" href="/shared.css">


  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
  <style>

    /* ── Content ── */
    .content { max-width: 900px; margin: 0 auto; padding: 28px 20px; }

    /* ── Section header ── */
    .section-label {
      font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--gold-dk); margin-bottom: 12px;
    }

    /* ── Day range tabs ── */
    .range-tabs { display: flex; gap: 6px; margin-bottom: 28px; }
    .range-tab {
      padding: 6px 16px; font-size: 11px; letter-spacing: 0.18em;
      text-transform: uppercase; border: 1px solid var(--border);
      background: transparent; color: var(--grey-lt); cursor: pointer;
      transition: all 0.15s;
    }
    .range-tab:hover { border-color: var(--gold); color: var(--gold); }
    .range-tab.active { background: rgba(201,168,76,0.12); border-color: var(--gold); color: var(--gold); }

    /* ── Summary cards ── */
    .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
    @media (max-width: 640px) { .cards { grid-template-columns: repeat(2, 1fr); } }
    .card {
      background: var(--navy-mid); border: 1px solid var(--border);
      padding: 16px 14px;
    }
    .card-value { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--gold-lt); line-height: 1; }
    .card-label { font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--grey); margin-top: 6px; }

    /* ── Bar chart (events by day) ── */
    .chart-section { margin-bottom: 32px; }
    .bar-chart {
      display: flex; align-items: flex-end; gap: 6px;
      height: 100px; padding-bottom: 24px; position: relative;
    }
    .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; }
    .bar {
      width: 100%; background: rgba(201,168,76,0.35);
      border-top: 1px solid var(--gold);
      min-height: 2px; transition: height 0.3s;
      position: relative;
    }
    .bar:hover { background: rgba(201,168,76,0.55); }
    .bar-tip {
      position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: var(--gold-lt); white-space: nowrap;
      opacity: 0; transition: opacity 0.15s;
    }
    .bar:hover .bar-tip { opacity: 1; }
    .bar-date { font-size: 9px; color: var(--grey); margin-top: 4px; letter-spacing: 0.05em; white-space: nowrap; }

    /* ── Two-col layout ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

    /* ── Persona / action breakdown ── */
    .breakdown-section { background: var(--navy-mid); border: 1px solid var(--border); padding: 18px; }
    .breakdown-row { margin-bottom: 14px; }
    .breakdown-row:last-child { margin-bottom: 0; }
    .breakdown-meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .breakdown-name { font-size: 11px; color: var(--grey-lt); letter-spacing: 0.06em; }
    .breakdown-count { font-size: 11px; color: var(--gold); }
    .breakdown-bar-bg { height: 4px; background: rgba(255,255,255,0.06); }
    .breakdown-bar-fill { height: 4px; background: var(--gold); transition: width 0.4s; }

    /* ── Recent events table ── */
    .table-section { background: var(--navy-mid); border: 1px solid var(--border); }
    .table-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th {
      text-align: left; padding: 8px 12px;
      font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold-dk); font-weight: 400;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 8px 12px; color: var(--grey-lt); border-bottom: 1px solid rgba(255,255,255,0.04); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(201,168,76,0.04); }

    .badge {
      display: inline-block; padding: 2px 7px; font-size: 9px;
      letter-spacing: 0.18em; text-transform: uppercase;
    }
    .badge-admin     { background: rgba(201,168,76,0.15); color: var(--gold); }
    .badge-captain   { background: rgba(74,144,196,0.15); color: #7ab8e8; }
    .badge-organiser { background: rgba(120,180,120,0.15); color: #8ecf8e; }
    .badge-fan       { background: rgba(138,150,168,0.15); color: var(--grey-lt); }

    /* ── Loading / error ── */
    .state-msg { text-align: center; padding: 48px; color: var(--grey); font-size: 13px; }
    .loading-dot { display: inline-block; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

    .empty-note { color: var(--grey); font-style: italic; font-size: 11px; padding: 16px 12px; }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-left">
      <a href="/season3.html" class="nav-back">&#8592; Season 3</a>
      <div>
        <div class="nav-title">Usage Analytics</div>
        <div class="nav-subtitle">Admin · Captain · Organiser</div>
      </div>
    </div>
  </nav>

  <div class="content" id="mainContent">
    <div class="state-msg"><span class="loading-dot">&#9632;</span> Loading…</div>
  </div>

  <script>
    /* ── Auth guard ── */
    const SESSION = (() => {
      try { return JSON.parse(sessionStorage.getItem('rtgs_session')) || {}; }
      catch(e) { return {}; }
    })();
    if (!['admin','captain','organiser'].includes(SESSION.role)) {
      window.location.replace('/');
      throw new Error('Not authorised'); // stop all further execution
    }

    let allEvents   = [];
    let currentDays = 7;

    /* ── Fetch events ── */
    async function loadData(days) {
      currentDays = days;
      document.getElementById('mainContent').innerHTML =
        '<div class="state-msg"><span class="loading-dot">&#9632;</span> Loading…</div>';
      try {
        const res = await fetch(`/api/analytics?days=${days}`, {
          headers: { 'Authorization': `Bearer ${SESSION.token}` }
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        allEvents = json.events || [];
        render(days);
      } catch(e) {
        document.getElementById('mainContent').innerHTML =
          `<div class="state-msg">Could not load analytics: ${e.message}</div>`;
      }
    }

    /* ── Helpers ── */
    function dateLabel(isoTs) {
      const d = new Date(isoTs);
      return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short' });
    }

    function timeLabel(isoTs) {
      const d = new Date(isoTs);
      return d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    }

    function eventLabel(e) {
      const map = {
        page_view:      'Page View',
        login:          'Login',
        logout:         'Logout',
        match_view:     'Match View',
        result_submit:  'Submit Result',
        result_approve: 'Approve Result',
        result_dispute: 'Dispute Result',
      };
      return map[e] || e;
    }

    function badgeClass(persona) {
      if (persona === 'admin')     return 'badge-admin';
      if (persona === 'captain')   return 'badge-captain';
      if (persona === 'organiser') return 'badge-organiser';
      return 'badge-fan';
    }

    /* ── Build days list for chart ── */
    function buildDayBuckets(days) {
      const buckets = {};
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date();
        d.setUTCDate(d.getUTCDate() - i);
        buckets[d.toISOString().slice(0, 10)] = 0;
      }
      allEvents.forEach(ev => {
        const day = (ev.ts || '').slice(0, 10);
        if (day in buckets) buckets[day]++;
      });
      return buckets;
    }

    /* ── Render ── */
    function render(days) {
      const events = allEvents;
      const total  = events.length;

      // Unique usernames
      const uniqueUsers = new Set(events.map(e => e.username)).size;

      // Active days (days with at least 1 event)
      const activeDays = new Set(events.map(e => (e.ts || '').slice(0, 10))).size;

      // Persona counts
      const byPersona = {};
      events.forEach(e => { byPersona[e.persona] = (byPersona[e.persona] || 0) + 1; });
      const topPersona = Object.entries(byPersona).sort((a,b) => b[1]-a[1])[0];

      // Action counts
      const byAction = {};
      events.forEach(e => { byAction[e.event] = (byAction[e.event] || 0) + 1; });
      const topAction = Object.entries(byAction).sort((a,b) => b[1]-a[1])[0];

      // Day buckets
      const dayBuckets = buildDayBuckets(days);
      const maxDay = Math.max(...Object.values(dayBuckets), 1);

      // Persona breakdown sorted
      const personaRows = Object.entries(byPersona).sort((a,b) => b[1]-a[1]);

      // Action breakdown sorted
      const actionRows = Object.entries(byAction).sort((a,b) => b[1]-a[1]).slice(0, 6);

      // Recent events (last 50, most recent first)
      const recent = [...events]
        .sort((a, b) => (b.ts || '').localeCompare(a.ts || ''))
        .slice(0, 50);

      document.getElementById('mainContent').innerHTML = `

        <!-- Range tabs -->
        <div class="range-tabs">
          <button class="range-tab ${days===7?'active':''}"  onclick="loadData(7)">7 days</button>
          <button class="range-tab ${days===14?'active':''}" onclick="loadData(14)">14 days</button>
          <button class="range-tab ${days===30?'active':''}" onclick="loadData(30)">30 days</button>
        </div>

        <!-- Summary cards -->
        <div class="section-label">Overview</div>
        <div class="cards">
          <div class="card">
            <div class="card-value">${total}</div>
            <div class="card-label">Total Events</div>
          </div>
          <div class="card">
            <div class="card-value">${uniqueUsers}</div>
            <div class="card-label">Unique Users</div>
          </div>
          <div class="card">
            <div class="card-value">${activeDays}</div>
            <div class="card-label">Active Days</div>
          </div>
          <div class="card">
            <div class="card-value" style="font-size:16px;padding-top:6px;">${topAction ? eventLabel(topAction[0]) : '—'}</div>
            <div class="card-label">Top Action</div>
          </div>
        </div>

        <!-- Events by day bar chart -->
        <div class="chart-section">
          <div class="section-label">Events by Day</div>
          <div class="bar-chart">
            ${Object.entries(dayBuckets).map(([day, count]) => {
              const pct = Math.round((count / maxDay) * 100);
              const shortDay = day.slice(5); // MM-DD
              return `<div class="bar-col">
                <div class="bar" style="height:${pct}%">
                  <span class="bar-tip">${count}</span>
                </div>
                <div class="bar-date">${shortDay}</div>
              </div>`;
            }).join('')}
          </div>
        </div>

        <!-- Persona + Action breakdown -->
        <div class="two-col">
          <div>
            <div class="section-label">By Persona</div>
            <div class="breakdown-section">
              ${personaRows.length === 0
                ? `<div class="empty-note">No data yet</div>`
                : personaRows.map(([persona, count]) => `
                  <div class="breakdown-row">
                    <div class="breakdown-meta">
                      <span class="breakdown-name">${persona}</span>
                      <span class="breakdown-count">${count}</span>
                    </div>
                    <div class="breakdown-bar-bg">
                      <div class="breakdown-bar-fill" style="width:${Math.round(count/total*100)}%"></div>
                    </div>
                  </div>`).join('')}
            </div>
          </div>
          <div>
            <div class="section-label">Top Actions</div>
            <div class="breakdown-section">
              ${actionRows.length === 0
                ? `<div class="empty-note">No data yet</div>`
                : actionRows.map(([action, count]) => `
                  <div class="breakdown-row">
                    <div class="breakdown-meta">
                      <span class="breakdown-name">${eventLabel(action)}</span>
                      <span class="breakdown-count">${count}</span>
                    </div>
                    <div class="breakdown-bar-bg">
                      <div class="breakdown-bar-fill" style="width:${Math.round(count/total*100)}%"></div>
                    </div>
                  </div>`).join('')}
            </div>
          </div>
        </div>

        <!-- Recent events -->
        <div class="section-label">Recent Events</div>
        <div class="table-section">
          <div class="table-header">
            <span class="section-label" style="margin:0;">Last ${recent.length} events</span>
          </div>
          <div class="table-scroll">
            ${recent.length === 0
              ? `<div class="empty-note">No events recorded yet. Visit the site pages to start capturing data.</div>`
              : `<table>
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>Time</th>
                      <th>Who</th>
                      <th>Persona</th>
                      <th>Action</th>
                      <th>Page</th>
                      <th>Country</th>
                      <th>City</th>
                      <th>ISP</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${recent.map(ev => `
                      <tr>
                        <td>${dateLabel(ev.ts)}</td>
                        <td>${timeLabel(ev.ts)}</td>
                        <td>${ev.username || '—'}</td>
                        <td><span class="badge ${badgeClass(ev.persona)}">${ev.persona || '—'}</span></td>
                        <td>${eventLabel(ev.event)}</td>
                        <td style="color:var(--grey)">${ev.page || '/'}</td>
                        <td style="color:var(--grey)">${ev.country ?? '—'}</td>
                        <td style="color:var(--grey)">${ev.city ?? '—'}</td>
                        <td style="color:var(--grey)">${ev.isp ?? '—'}</td>
                      </tr>`).join('')}
                  </tbody>
                </table>`}
          </div>
        </div>
      `;
    }

    /* ── Boot ── */
    loadData(7);
  </script>

</body>
</html>
