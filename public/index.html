<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RTGS Premier Golf League</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Raleway:wght@200;300;400;500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy:       #0a1628;
      --navy-mid:   #0f1f38;
      --navy-lt:    #162847;
      --gold:       #c9a84c;
      --gold-lt:    #e8c97a;
      --gold-dk:    #a07830;
      --white:      #ffffff;
      --off-white:  #f0ece4;
      --grey:       #8a96a8;
      --grey-lt:    #b8c0cc;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--navy);
      font-family: 'Raleway', sans-serif;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Deep radial vignette */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 0%,   rgba(201,168,76,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.55) 0%, transparent 70%),
        radial-gradient(ellipse at 0%   50%, rgba(0,0,0,0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 100% 50%, rgba(0,0,0,0.35) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle texture overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    /* Top border accent */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(to right, transparent, var(--gold), var(--gold-lt), var(--gold), transparent);
      z-index: 100;
    }

    /* Corner marks */
    .corner {
      position: fixed;
      width: 48px;
      height: 48px;
      z-index: 10;
      opacity: 0.5;
    }
    .corner-tl { top: 24px; left: 24px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner-tr { top: 24px; right: 24px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

    /* Header strip */
    .header {
      position: fixed;
      top: 3px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      z-index: 50;
      opacity: 0;
      animation: fadeDown 0.9s 0.1s ease forwards;
    }
    .header-label {
      font-size: 9px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--grey);
      font-weight: 300;
    }
    .header-signin {
      background: none; border: 1px solid rgba(201,168,76,0.25);
      color: var(--grey); font-family: 'Raleway', sans-serif;
      font-size: 9px; letter-spacing: 0.38em; text-transform: uppercase;
      padding: 5px 14px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .header-signin:hover { border-color: rgba(201,168,76,0.6); color: var(--gold-lt); }
    .header-user {
      display: flex; align-items: center; gap: 10px;
      font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--grey);
    }
    .header-signout {
      background: none; border: none; color: var(--grey); font-family: 'Raleway', sans-serif;
      font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase;
      cursor: pointer; padding: 0; transition: color 0.2s;
    }
    .header-signout:hover { color: var(--grey-lt); }

    /* Main card */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 64px 80px 56px;
      max-width: 800px;
      width: 100%;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Crest / emblem */
    .crest-wrap {
      margin: 0 auto 36px;
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 1.5px solid rgba(201,168,76,0.45);
      box-shadow: 0 0 24px rgba(201,168,76,0.15), 0 0 0 4px rgba(201,168,76,0.07);
      overflow: hidden;
      background: #ffffff;
    }
    .crest-img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }
    /* legacy — keep so mobile override below still compiles */
    .crest {
      margin: 0 auto 36px;
      width: 72px;
      height: 72px;
      opacity: 0;
      animation: fadeIn 1.1s 0.3s ease forwards;
    }

    /* Eyebrow label */
    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeUp 0.9s 0.5s ease forwards;
    }

    /* Thin rule */
    .rule {
      display: flex;
      align-items: center;
      gap: 0;
      margin: 0 auto 28px;
      width: 240px;
      opacity: 0;
      animation: fadeUp 0.9s 0.6s ease forwards;
    }
    .rule-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dk));
    }
    .rule-line:last-child {
      background: linear-gradient(to left, transparent, var(--gold-dk));
    }
    .rule-diamond {
      width: 5px;
      height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
      margin: 0 10px;
    }

    /* League name */
    .league-name {
      font-family: 'Raleway', sans-serif;
      font-size: clamp(0.65rem, 1.5vw, 0.8rem);
      font-weight: 300;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--grey-lt);
      margin-bottom: 14px;
      opacity: 0;
      animation: fadeUp 0.9s 0.65s ease forwards;
    }

    /* Main title */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 500;
      line-height: 0.9;
      letter-spacing: 0.04em;
      color: var(--white);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1s 0.75s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    h1 .accent {
      color: var(--gold);
    }

    /* Italic tagline subtitle */
    .tagline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      font-weight: 400;
      font-style: italic;
      color: var(--grey-lt);
      letter-spacing: 0.05em;
      margin-top: 10px;
      opacity: 0;
      animation: fadeUp 0.9s 0.95s ease forwards;
    }

    /* Horizontal rule divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0;
      margin: 36px auto;
      width: 360px;
      max-width: 90%;
      opacity: 0;
      animation: fadeIn 1s 1.1s ease forwards;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(201,168,76,0.3);
    }
    .divider-ornament {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      flex-shrink: 0;
    }
    .divider-diamond {
      width: 5px;
      height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
    }
    .divider-diamond-sm {
      width: 3px;
      height: 3px;
      background: var(--gold-dk);
      transform: rotate(45deg);
    }

    /* Subtitle copy */
    .subtitle {
      font-family: 'Raleway', sans-serif;
      font-size: clamp(0.65rem, 1.5vw, 0.78rem);
      font-weight: 300;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--grey);
      opacity: 0;
      animation: fadeUp 0.9s 1.2s ease forwards;
    }

    /* Season status pill */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-top: 44px;
      padding: 12px 32px;
      border: 1px solid rgba(201,168,76,0.35);
      background: rgba(201,168,76,0.06);
      opacity: 0;
      animation: fadeUp 0.9s 1.4s ease forwards;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.3s ease, background 0.3s ease;
    }
    .badge:hover {
      border-color: rgba(201,168,76,0.7);
      background: rgba(201,168,76,0.12);
    }
    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 2.5s 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1;   box-shadow: 0 0 0 0 rgba(201,168,76,0.5); }
      50%       { opacity: 0.7; box-shadow: 0 0 0 5px rgba(201,168,76,0); }
    }
    .badge-text {
      font-size: 10px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      font-weight: 400;
      color: var(--grey-lt);
    }
    .badge-text strong {
      color: var(--gold);
      font-weight: 500;
    }
    .badge-sep {
      color: var(--gold-dk);
      opacity: 0.6;
      letter-spacing: 0;
    }

    /* Bottom footer strip */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 48px;
      z-index: 50;
      opacity: 0;
      animation: fadeIn 1s 1.6s ease forwards;
    }
    .footer-text {
      font-size: 9px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(138,150,168,0.45);
      font-weight: 300;
    }

    /* ── Login overlay ── */
    .login-overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(5, 12, 25, 0.97);
      backdrop-filter: blur(6px);
      transition: opacity 0.4s ease;
    }
    .login-overlay.hidden {
      opacity: 0; pointer-events: none;
    }
    .login-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px;
      padding: 48px 40px 40px;
      border: 1px solid rgba(201,168,76,0.22);
      background: var(--navy-mid);
      text-align: center;
    }
    .login-crest {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.35);
      overflow: hidden;
      margin: 0 auto 20px;
      background: #fff;
    }
    .login-crest img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .login-eyebrow {
      font-size: 9px; letter-spacing: 0.45em; text-transform: uppercase;
      color: var(--gold); font-weight: 400; margin-bottom: 6px;
    }
    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 500; color: var(--white);
      letter-spacing: 0.05em; margin-bottom: 8px;
    }
    .login-sub {
      font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--grey); font-weight: 300; margin-bottom: 28px;
    }
    .login-divider {
      display: flex; align-items: center; gap: 0; margin: 0 auto 28px; width: 200px;
    }
    .login-divider-line { flex: 1; height: 1px; background: rgba(201,168,76,0.2); }
    .login-divider-dot { width: 4px; height: 4px; background: var(--gold-dk); transform: rotate(45deg); margin: 0 10px; }
    .login-field {
      width: 100%; background: rgba(10,22,40,0.8);
      border: 1px solid rgba(201,168,76,0.15);
      color: var(--white); font-family: 'Raleway', sans-serif;
      font-size: 0.88rem; font-weight: 300; letter-spacing: 0.06em;
      padding: 11px 14px; outline: none; margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .login-field:focus { border-color: rgba(201,168,76,0.5); }
    .login-field::placeholder { color: var(--grey); }
    .login-btn {
      width: 100%; padding: 12px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold-lt); font-family: 'Raleway', sans-serif;
      font-size: 10px; letter-spacing: 0.38em; text-transform: uppercase;
      font-weight: 500; cursor: pointer; margin-top: 6px;
      transition: background 0.2s, border-color 0.2s;
    }
    .login-btn:hover { background: rgba(201,168,76,0.18); border-color: var(--gold); }
    .login-error {
      font-size: 11px; letter-spacing: 0.1em; color: #c44a4a;
      min-height: 18px; margin-bottom: 6px; text-align: left;
    }
    .login-guest-wrap {
      margin-top: 20px; padding-top: 18px;
      border-top: 1px solid rgba(201,168,76,0.1);
    }
    .login-guest-btn {
      background: none; border: none;
      color: var(--grey); font-family: 'Raleway', sans-serif;
      font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
      cursor: pointer; padding: 0; transition: color 0.2s;
    }
    .login-guest-btn:hover { color: var(--grey-lt); }
    .login-hint {
      margin-top: 20px;
      font-size: 10px; letter-spacing: 0.12em; color: rgba(138,150,168,0.4);
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      html, body { overflow: auto; height: auto; min-height: 100dvh; }

      body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

      .corner { width: 28px; height: 28px; }
      .corner-tl { top: 16px; left: 16px; }
      .corner-tr { top: 16px; right: 16px; }
      .corner-bl { bottom: 16px; left: 16px; }
      .corner-br { bottom: 16px; right: 16px; }

      .header { padding: 14px 24px; }

      .card { padding: 80px 24px 80px; }

      .crest-wrap { width: 80px; height: 80px; margin-bottom: 24px; }
      .crest { width: 52px; height: 52px; margin-bottom: 24px; }

      .eyebrow {
        font-size: 9px;
        letter-spacing: 0.3em;
        margin-bottom: 16px;
      }

      .rule { width: 160px; margin-bottom: 20px; }

      h1 { font-size: clamp(3.5rem, 20vw, 5rem); }

      .tagline {
        font-size: clamp(0.9rem, 4vw, 1.2rem);
        letter-spacing: 0.03em;
      }

      .divider { margin: 24px auto; }

      .subtitle {
        font-size: 0.68rem;
        letter-spacing: 0.28em;
      }

      .badge {
        margin-top: 32px;
        padding: 12px 22px;
        gap: 10px;
      }

      .badge-text { font-size: 10px; letter-spacing: 0.22em; }

      .footer { padding: 16px 24px; }
      .footer-text { font-size: 8px; letter-spacing: 0.25em; }
    }
  </style>
</head>
<body>

  <div class="top-bar"></div>

  <!-- Corners -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Header -->
  <div class="header">
    <span class="header-label">Est. &nbsp;2020</span>
    <div id="headerAuth"></div>
  </div>

  <!-- Main content -->
  <div class="card">

    <!-- Logo -->
    <div class="crest-wrap">
      <img src="/rtgs-logo.jpg" alt="RTGS Golf Logo" class="crest-img" />
    </div>

    <!-- Eyebrow -->
    <p class="eyebrow">Premier Golf League</p>

    <!-- Thin rule -->
    <div class="rule">
      <div class="rule-line"></div>
      <div class="rule-diamond"></div>
      <div class="rule-line"></div>
    </div>

    <!-- Main title -->
    <h1>RT<span class="accent">G</span>S <span class="accent">GOLF</span></h1>

    <!-- Tagline -->
    <p class="tagline">Forging Lifelong Bonds</p>

    <!-- Divider ornament -->
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-ornament">
        <div class="divider-diamond-sm"></div>
        <div class="divider-diamond"></div>
        <div class="divider-diamond-sm"></div>
      </div>
      <div class="divider-line"></div>
    </div>

    <!-- Subtitle -->
    <p class="subtitle">Where Fairways Meet Brotherhood</p>

    <!-- Season badge -->
    <a href="/season3.html" class="badge">
      <div class="badge-dot"></div>
      <span class="badge-text">
        <strong>Season 3</strong>
        <span class="badge-sep">&nbsp;&nbsp;|&nbsp;&nbsp;</span>
        View Details
      </span>
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="opacity:0.6;flex-shrink:0;">
        <path d="M2 5h6M5.5 2.5L8 5l-2.5 2.5" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-text">RTGS Premier Golf League &nbsp;&mdash;&nbsp; All Rights Reserved</span>
  </div>

  <!-- Login Overlay -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-crest">
        <img src="/rtgs-logo.jpg" alt="RTGS Golf" />
      </div>
      <p class="login-eyebrow">Member Access</p>
      <div class="login-title">RTGS PGL</div>
      <p class="login-sub">Season 3 &nbsp;·&nbsp; 2026</p>
      <div class="login-divider">
        <div class="login-divider-line"></div>
        <div class="login-divider-dot"></div>
        <div class="login-divider-line"></div>
      </div>
      <input type="text"     class="login-field" id="loginUser" placeholder="Username" autocomplete="username" />
      <input type="password" class="login-field" id="loginPass" placeholder="Password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()" />
      <div class="login-error" id="loginError"></div>
      <button class="login-btn" onclick="doLogin()">Sign In</button>
      <p class="login-hint">admin &nbsp;·&nbsp; captain &nbsp;·&nbsp; player / fan</p>
    </div>
  </div>

  <script>
    /* ── Auth ── */
    const USERS = [
      { username:'admin',     password:'rtgs@2026',  role:'admin',   team:null, display:'Admin' },
      { username:'captain.d', password:'dhurandhar', role:'captain', team:'D',  display:'Capt · Team Dhurandhar' },
      { username:'captain.r', password:'rushabh',    role:'captain', team:'R',  display:'Capt · Team Rushabh' },
    ];

    const DEFAULT_SESSION = { username:'guest', role:'fan', team:null, display:'Player / Fan' };

    function getSession() {
      try { return JSON.parse(sessionStorage.getItem('rtgs_session')) || DEFAULT_SESSION; }
      catch(e) { return DEFAULT_SESSION; }
    }

    function openLoginOverlay() {
      document.getElementById('loginOverlay').classList.remove('hidden');
      document.getElementById('loginUser').focus();
    }

    function closeLoginOverlay() {
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('loginError').textContent = '';
    }

    function doLogin() {
      const u = document.getElementById('loginUser').value.trim().toLowerCase();
      const p = document.getElementById('loginPass').value;
      const err = document.getElementById('loginError');
      const match = USERS.find(x => x.username === u && x.password === p);
      if (!match) {
        err.textContent = 'Invalid username or password.';
        document.getElementById('loginPass').value = '';
        return;
      }
      err.textContent = '';
      sessionStorage.setItem('rtgs_session', JSON.stringify({
        username: match.username, role: match.role,
        team: match.team, display: match.display
      }));
      closeLoginOverlay();
      renderHeaderAuth();
    }

    function doLogout() {
      sessionStorage.removeItem('rtgs_session');
      renderHeaderAuth();
    }

    function renderHeaderAuth() {
      const session = getSession();
      const el = document.getElementById('headerAuth');
      if (session.role === 'fan') {
        el.innerHTML = `<button class="header-signin" onclick="openLoginOverlay()">Sign In</button>`;
      } else {
        el.innerHTML = `
          <div class="header-user">
            <span>${session.display}</span>
            <button class="header-signout" onclick="doLogout()">Sign Out</button>
          </div>`;
      }
    }

    // Start overlay hidden — only opens on demand
    document.getElementById('loginOverlay').classList.add('hidden');
    renderHeaderAuth();
  </script>

</body>
</html>
